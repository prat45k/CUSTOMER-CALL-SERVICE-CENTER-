<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Center - Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background circles */
        .bg-circles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .bg-circles .circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.08;
            animation: floatCircle 20s infinite ease-in-out;
        }
        .bg-circles .circle:nth-child(1) {
            width: 400px; height: 400px;
            background: #6c63ff;
            top: -100px; left: -100px;
            animation-delay: 0s;
        }
        .bg-circles .circle:nth-child(2) {
            width: 300px; height: 300px;
            background: #ff6584;
            bottom: -80px; right: -80px;
            animation-delay: -5s;
        }
        .bg-circles .circle:nth-child(3) {
            width: 200px; height: 200px;
            background: #43e97b;
            top: 50%; left: 60%;
            animation-delay: -10s;
        }

        @keyframes floatCircle {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.1); }
            50% { transform: translate(-20px, 30px) scale(0.95); }
            75% { transform: translate(40px, 20px) scale(1.05); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 420px;
            max-width: 95%;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-logo {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 32px;
            box-shadow: 0 8px 25px rgba(108, 99, 255, 0.35);
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 25px rgba(108, 99, 255, 0.35); }
            50% { box-shadow: 0 8px 40px rgba(108, 99, 255, 0.55); }
        }

        .login-header h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-top: 6px;
        }

        /* Tab Switcher */
        .tab-switcher {
            display: flex;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 11px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            color: #fff;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.35);
        }

        .tab-btn:hover:not(.active) {
            color: rgba(255, 255, 255, 0.8);
        }

        /* Forms */
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .input-wrapper input:focus {
            border-color: #6c63ff;
            background: rgba(108, 99, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108, 99, 255, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Message */
        .message {
            text-align: center;
            margin-top: 16px;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            display: none;
        }
        .message.success {
            display: block;
            background: rgba(67, 233, 123, 0.12);
            color: #43e97b;
            border: 1px solid rgba(67, 233, 123, 0.2);
            animation: fadeIn 0.3s ease;
        }
        .message.error {
            display: block;
            background: rgba(255, 101, 132, 0.12);
            color: #ff6584;
            border: 1px solid rgba(255, 101, 132, 0.2);
            animation: fadeIn 0.3s ease;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="bg-circles">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">📞</div>
                <h1>Call Center Admin</h1>
                <p>Manage your customer service queue</p>
            </div>

            <div class="tab-switcher">
                <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <div class="form-section active" id="loginForm">
                <div class="input-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <span class="icon">👤</span>
                        <input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="off">
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="icon">🔒</span>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                    </div>
                </div>
                <button class="submit-btn" onclick="handleLogin()">Sign In →</button>
                <div class="message" id="loginMessage"></div>
            </div>

            <!-- Register Form -->
            <div class="form-section" id="registerForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <span class="icon">📝</span>
                        <input type="text" id="regName" placeholder="Enter your full name" autocomplete="off">
                    </div>
                </div>
                <div class="input-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <span class="icon">👤</span>
                        <input type="text" id="regUsername" placeholder="Choose a username" autocomplete="off">
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="icon">🔒</span>
                        <input type="password" id="regPassword" placeholder="Create a password">
                    </div>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <span class="icon">🔒</span>
                        <input type="password" id="regConfirm" placeholder="Confirm your password">
                    </div>
                </div>
                <button class="submit-btn" onclick="handleRegister()">Create Account →</button>
                <div class="message" id="registerMessage"></div>
            </div>

            <div class="footer-text">Customer Service Call Center &copy; 2026</div>
        </div>
    </div>

    <script>
        // =============================================
        // Tab Switching
        // =============================================
        function switchTab(tab) {
            var loginTab = document.getElementById('loginTab');
            var registerTab = document.getElementById('registerTab');
            var loginForm = document.getElementById('loginForm');
            var registerForm = document.getElementById('registerForm');

            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
            }
            // Clear messages
            document.getElementById('loginMessage').className = 'message';
            document.getElementById('loginMessage').textContent = '';
            document.getElementById('registerMessage').className = 'message';
            document.getElementById('registerMessage').textContent = '';
        }

        // =============================================
        // Show Message Helper
        // =============================================
        function showMessage(elementId, text, type) {
            var msgEl = document.getElementById(elementId);
            msgEl.textContent = text;
            msgEl.className = 'message ' + type;
        }

        // =============================================
        // Register Handler
        // =============================================
        function handleRegister() {
            var name = document.getElementById('regName').value.trim();
            var username = document.getElementById('regUsername').value.trim();
            var password = document.getElementById('regPassword').value;
            var confirm = document.getElementById('regConfirm').value;

            // Validate inputs
            if (!name || !username || !password || !confirm) {
                showMessage('registerMessage', 'Please fill in all fields!', 'error');
                return;
            }
            if (username.length < 3) {
                showMessage('registerMessage', 'Username must be at least 3 characters!', 'error');
                return;
            }
            if (password.length < 4) {
                showMessage('registerMessage', 'Password must be at least 4 characters!', 'error');
                return;
            }
            if (password !== confirm) {
                showMessage('registerMessage', 'Passwords do not match!', 'error');
                return;
            }

            // Check if user already exists
            var users = JSON.parse(localStorage.getItem('callcenter_users') || '[]');
            var exists = false;
            for (var i = 0; i < users.length; i++) {
                if (users[i].username === username) {
                    exists = true;
                    break;
                }
            }
            if (exists) {
                showMessage('registerMessage', 'Username already taken!', 'error');
                return;
            }

            // Save new user
            users.push({
                name: name,
                username: username,
                password: password
            });
            localStorage.setItem('callcenter_users', JSON.stringify(users));

            showMessage('registerMessage', 'Account created successfully! Please sign in.', 'success');

            // Clear form
            document.getElementById('regName').value = '';
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regConfirm').value = '';

            // Switch to login after 1.5 seconds
            setTimeout(function() {
                switchTab('login');
            }, 1500);
        }

        // =============================================
        // Login Handler
        // =============================================
        function handleLogin() {
            var username = document.getElementById('loginUsername').value.trim();
            var password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showMessage('loginMessage', 'Please enter username and password!', 'error');
                return;
            }

            var users = JSON.parse(localStorage.getItem('callcenter_users') || '[]');

            // Default admin account
            if (username === 'admin' && password === 'admin') {
                localStorage.setItem('callcenter_loggedIn', 'true');
                localStorage.setItem('callcenter_adminName', 'Administrator');
                showMessage('loginMessage', 'Login successful! Redirecting...', 'success');
                setTimeout(function() {
                    window.location.href = 'dashboard.html';
                }, 800);
                return;
            }

            // Check registered users
            var found = false;
            for (var i = 0; i < users.length; i++) {
                if (users[i].username === username && users[i].password === password) {
                    found = true;
                    localStorage.setItem('callcenter_loggedIn', 'true');
                    localStorage.setItem('callcenter_adminName', users[i].name);
                    showMessage('loginMessage', 'Login successful! Redirecting...', 'success');
                    setTimeout(function() {
                        window.location.href = 'dashboard.html';
                    }, 800);
                    return;
                }
            }

            showMessage('loginMessage', 'Invalid username or password!', 'error');
        }

        // Handle Enter key on inputs
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                var loginForm = document.getElementById('loginForm');
                if (loginForm.classList.contains('active')) {
                    handleLogin();
                } else {
                    handleRegister();
                }
            }
        });

        // If already logged in, go to dashboard
        if (localStorage.getItem('callcenter_loggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
